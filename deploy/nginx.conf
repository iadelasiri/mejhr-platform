# Mejhr Platform — Nginx Production Configuration
#
# Prerequisites:
#   1. Replace "mejhr.example.sa" with your real domain everywhere.
#   2. Obtain a TLS certificate (e.g. certbot --nginx -d mejhr.example.sa).
#   3. Place this file at /etc/nginx/sites-available/mejhr and symlink to
#      /etc/nginx/sites-enabled/mejhr (or use COPY in a nginx Docker image).
#
# This config:
#   - Redirects HTTP → HTTPS
#   - Terminates TLS; proxies to backend (port 8000) and frontend (port 3000)
#   - Sets security headers, rate limits, and appropriate timeouts

# Rate limiting zones (defined in http context, referenced in server blocks)
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=general:10m rate=60r/m;

# ── upstream services (match Docker Compose service names) ─────────────────
upstream backend {
    server backend:8000;
    keepalive 32;
}

upstream frontend {
    server frontend:3000;
    keepalive 16;
}

# ── HTTP → HTTPS redirect ──────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name mejhr.example.sa;

    # Allow Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS ──────────────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name mejhr.example.sa;

    # ── TLS certificates (issued by Let's Encrypt / certbot) ──────────────
    ssl_certificate     /etc/letsencrypt/live/mejhr.example.sa/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mejhr.example.sa/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/mejhr.example.sa/chain.pem;

    # ── TLS hardening ──────────────────────────────────────────────────────
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:MejhrSSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling        on;
    ssl_stapling_verify on;

    # ── Security headers ───────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # ── Logging ────────────────────────────────────────────────────────────
    access_log /var/log/nginx/mejhr_access.log combined;
    error_log  /var/log/nginx/mejhr_error.log warn;

    # ── Client settings ────────────────────────────────────────────────────
    client_max_body_size 16M;
    client_body_timeout  60s;
    client_header_timeout 60s;

    # ── API routes → FastAPI backend ───────────────────────────────────────
    location /api/ {
        limit_req zone=api burst=20 nodelay;

        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout  10s;
        proxy_send_timeout     60s;
        proxy_read_timeout    300s;  # long for import jobs

        proxy_buffering    on;
        proxy_buffer_size  8k;
        proxy_buffers      8 8k;
    }

    # ── FastAPI docs (restrict to internal/admin IPs in production) ────────
    location ~ ^/(docs|redoc|openapi\.json) {
        # Uncomment to restrict to your office/VPN IP:
        # allow 10.0.0.0/8;
        # deny all;

        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Next.js frontend ───────────────────────────────────────────────────
    location / {
        limit_req zone=general burst=40 nodelay;

        proxy_pass http://frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout  10s;
        proxy_send_timeout     60s;
        proxy_read_timeout     60s;
    }

    # ── Static asset cache headers ─────────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        proxy_pass http://frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;

        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
}
